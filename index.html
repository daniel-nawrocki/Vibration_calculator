<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expected Vibration Calculator</title>

    <!-- PWA additions -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #007bff;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #007bff;
        }

        input {
            width: calc(100% - 16px);
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #result {
            margin-top: 20px;
            text-align: center;
            color: #007bff;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Expected Vibration Calculator</h1>
        <form id="vibrationForm">
            <label for="hFactor">H Factor:</label>
            <input type="number" id="hFactor" name="hFactor" value="160" min="1" required>

            <label for="poundsPerDelay">Pounds per Delay:</label>
            <input type="number" id="poundsPerDelay" name="poundsPerDelay" min="0" step="any" required>

            <label for="distanceToSeismograph">Distance to Seismograph (in feet):</label>
            <input type="number" id="distanceToSeismograph" name="distanceToSeismograph" min="0" required>

            <button type="button" onclick="calculatePPV()">Calculate</button>
        </form>

        <div id="result"></div>
    </div>

    <script>
        function calculatePPV() {
            var hFactor = parseFloat(document.getElementById('hFactor').value);
            var poundsPerDelay = parseFloat(document.getElementById('poundsPerDelay').value);
            var distanceToSeismograph = parseFloat(document.getElementById('distanceToSeismograph').value);

            var ppv = hFactor * Math.pow((Math.sqrt(poundsPerDelay) / distanceToSeismograph), 1.6);

            document.getElementById('result').innerHTML =
                "<p>Expected PPV: " + ppv.toFixed(3) + "</p>";
        }

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>

</html>
